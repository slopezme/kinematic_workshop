# Robot definition using a Transform (TF) Tree structure, similar to URDF/XACRO.
#
# Each joint connects a 'parent' link to a 'child' link.
# The 'origin' specifies the transform from the parent's frame to the joint's frame.
#   - xyz: translation
#   - rpy: rotation (roll, pitch, yaw) in radians
# The 'axis' defines the axis of rotation for the revolute joint, in the joint's own frame.

robot_name: "Sample 3-DOF Arm"

joints:
  - name: joint1
    parent: base_link
    child: link1
    origin: {xyz: [0, 0, 0.5], rpy: [0, 0, 0]}
    axis: {xyz: [0, 0, 1]} # Rotates around Z
    limit: {lower: 0, upper: 180} # degrees

  - name: joint2
    parent: link1
    child: link2
    origin: {xyz: [1.0, 0, 0], rpy: [0, 0, 0]}
    axis: {xyz: [0, 1, 0]} # Rotates around Y
    limit: {lower: 0, upper: 150} # degrees

  - name: joint3
    parent: link2
    child: tool_link
    origin: {xyz: [1.0, 0, 0], rpy: [0, 0, 0]}
    axis: {xyz: [0, 1, 0]} # Rotates around Y
    limit: {lower: 0, upper: 90} # degrees

# Configuration for test scripts
test_config:
  forward_kinematics_animation:
    initial_angles_deg: [0, 0, 0]
    final_angles_deg: [90, 45, 45]